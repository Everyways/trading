name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Lint & Test (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app/ scripts/ tests/

      - name: Ruff format check
        run: ruff format --check app/ scripts/ tests/

      - name: Run unit tests
        run: pytest tests/unit/ -q --tb=short --cov=app --cov-report=term-missing
        env:
          # Provide dummy required env vars so settings don't fail to load
          DATABASE_URL: "sqlite+aiosqlite:///./data/test.db"
          DATABASE_URL_SYNC: "sqlite:///./data/test.db"
          SECRET_KEY: "test-secret-key-minimum-32-chars-long"
          DASHBOARD_PASSWORD: "test"
