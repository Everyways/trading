version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://trading:trading@db:5432/trading
      DATABASE_URL_SYNC: postgresql+psycopg2://trading:trading@db:5432/trading
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
      - ../reports:/app/reports
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
