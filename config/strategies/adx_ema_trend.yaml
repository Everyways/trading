name: adx_ema_trend
version: "1.0.0"
enabled: true
mode: paper
provider: alpaca

# Trending instruments — ADX filter makes this suitable for volatile assets
universe:
  - symbol: SPY
    asset_class: equity
  - symbol: QQQ
    asset_class: equity
  - symbol: AAPL
    asset_class: equity
  - symbol: MSFT
    asset_class: equity

timeframe: 15m
lookback: 200     # 50 (slow EMA) + 14×2 (ADX warm-up) + buffer

params:
  ema_fast: 20          # Fast EMA period
  ema_slow: 50          # Slow EMA period
  adx_period: 14        # ADX / DI smoothing period (Wilder standard = 14)
  adx_threshold: 20.0   # Minimum ADX to allow signal (< 20 = range, > 25 = strong trend)
  stop_loss_pct: 2.0    # Stop-loss in % below entry
  take_profit_pct: 5.0  # Take-profit in % above entry (bracket order)

risk:
  max_risk_per_trade_pct: 1.0
  max_concurrent_positions: 2
  max_daily_loss_pct: 2.0
  max_drawdown_pct: 8.0
  max_exposure_pct: 20.0
  max_orders_per_minute: 5

execution:
  order_type: market
  time_in_force: day
